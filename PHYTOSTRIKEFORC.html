<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSF ERP — Phyto Strike Force</title>
<style>
:root{
  --vert:#1f7a3d;--vert2:#2fa85a;--bleu:#1d3f6e;--bleu2:#2c66b0;
  --bg:#f4f6f8;--card:#fff;--bord:#e2e8f0;--txt:#1e293b;--muted:#64748b;
  --rouge:#d63031;--orange:#e67e22;--ok:#16a34a;--ombre:0 1px 3px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
button{font-family:inherit;cursor:pointer;border:none;border-radius:6px;font-size:13px;padding:8px 14px}
input,select,textarea{font-family:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--bord);border-radius:6px;width:100%;background:#fff}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--bleu2)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f1f5f9;text-align:left;padding:9px 10px;font-weight:600;color:var(--muted);border-bottom:2px solid var(--bord);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--bord)}
tr:hover td{background:#f8fafc}
.btn-p{background:var(--vert);color:#fff}.btn-p:hover{background:var(--vert2)}
.btn-b{background:var(--bleu);color:#fff}.btn-b:hover{background:var(--bleu2)}
.btn-g{background:#e2e8f0;color:#334155}.btn-g:hover{background:#cbd5e1}
.btn-r{background:var(--rouge);color:#fff}.btn-sm{padding:5px 9px;font-size:12px}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.t-vert{background:#dcfce7;color:#166534}.t-bleu{background:#dbeafe;color:#1e40af}
.t-orange{background:#fef3c7;color:#92400e}.t-rouge{background:#fee2e2;color:#991b1b}
.t-gris{background:#f1f5f9;color:#475569}.t-violet{background:#ede9fe;color:#5b21b6}

/* LOGIN */
#login{position:fixed;inset:0;background:linear-gradient(135deg,var(--vert) 0%,var(--bleu) 100%);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-card{background:#fff;border-radius:14px;padding:38px;width:360px;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.login-logo{text-align:center;font-size:30px;font-weight:800;letter-spacing:2px;margin-bottom:4px}
.login-logo .v{color:var(--vert)}.login-logo .b{color:var(--bleu)}
.login-sub{text-align:center;color:var(--muted);font-size:12px;margin-bottom:24px}
.login-card label{display:block;font-size:12px;color:var(--muted);margin:12px 0 5px;font-weight:600}

/* SHELL */
#app{display:none;min-height:100vh}
.topbar{background:var(--card);border-bottom:1px solid var(--bord);height:56px;display:flex;align-items:center;padding:0 18px;position:sticky;top:0;z-index:100}
.brand{font-weight:800;font-size:18px;letter-spacing:1px}
.brand .v{color:var(--vert)}.brand .b{color:var(--bleu)}
.topbar .sp{flex:1}
.depot-sel{margin-right:14px;width:auto;min-width:150px}
.user-chip{display:flex;align-items:center;gap:8px;font-size:13px}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--bleu);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}
.layout{display:flex}
.sidebar{width:210px;background:var(--card);border-right:1px solid var(--bord);min-height:calc(100vh - 56px);padding:10px 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.nav-grp{font-size:10px;text-transform:uppercase;color:#94a3b8;font-weight:700;padding:14px 18px 4px;letter-spacing:.5px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;color:#475569;cursor:pointer;font-size:13px;border-left:3px solid transparent}
.nav-item:hover{background:#f8fafc}
.nav-item.on{background:#ecfdf5;color:var(--vert);border-left-color:var(--vert);font-weight:600}
.nav-item .ic{width:18px;text-align:center}
.main{flex:1;padding:20px;max-width:calc(100vw - 210px)}
.page-h{display:flex;align-items:center;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.page-h h1{font-size:21px;font-weight:700}.page-h .sp{flex:1}
.card{background:var(--card);border:1px solid var(--bord);border-radius:10px;padding:16px;box-shadow:var(--ombre);margin-bottom:16px}
.card-h{font-weight:700;font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.grid{display:grid;gap:14px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.kpi{background:var(--card);border:1px solid var(--bord);border-radius:10px;padding:16px;box-shadow:var(--ombre)}
.kpi .lab{font-size:12px;color:var(--muted);font-weight:600}
.kpi .val{font-size:24px;font-weight:800;margin-top:6px}
.kpi .sub{font-size:11px;color:var(--muted);margin-top:3px}
.kpi.vert{border-top:3px solid var(--vert)}.kpi.bleu{border-top:3px solid var(--bleu)}
.kpi.orange{border-top:3px solid var(--orange)}.kpi.rouge{border-top:3px solid var(--rouge)}
.row{display:flex;gap:12px;flex-wrap:wrap}
.f{flex:1;min-width:140px}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.toolbar input,.toolbar select{width:auto;min-width:160px}
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:flex-start;justify-content:center;z-index:500;padding:30px 16px;overflow-y:auto}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:12px;width:100%;max-width:680px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal.lg{max-width:920px}
.modal-h{padding:16px 20px;border-bottom:1px solid var(--bord);display:flex;align-items:center;font-weight:700;font-size:16px}
.modal-h .x{margin-left:auto;cursor:pointer;color:var(--muted);font-size:22px;line-height:1}
.modal-b{padding:20px;max-height:70vh;overflow-y:auto}
.modal-f{padding:14px 20px;border-top:1px solid var(--bord);display:flex;justify-content:flex-end;gap:8px}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:5px}
.right{text-align:right}.center{text-align:center}.bold{font-weight:700}
.txt-r{color:var(--rouge)}.txt-v{color:var(--ok)}.txt-m{color:var(--muted)}.sm{font-size:12px}
.empty{text-align:center;padding:40px;color:#94a3b8}
.toast{position:fixed;bottom:20px;right:20px;background:#1e293b;color:#fff;padding:12px 18px;border-radius:8px;z-index:2000;box-shadow:0 8px 24px rgba(0,0,0,.3);animation:sl .3s}
@keyframes sl{from{transform:translateY(20px);opacity:0}}
.lines-tbl input,.lines-tbl select{padding:5px 7px}
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--bord);margin-bottom:16px;flex-wrap:wrap}
.tab{padding:9px 16px;cursor:pointer;color:var(--muted);font-weight:600;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.on{color:var(--vert);border-bottom-color:var(--vert)}
.badge-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}
.progress{height:7px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.progress>i{display:block;height:100%;background:var(--vert)}
@media(max-width:860px){.sidebar{position:fixed;left:-210px;z-index:200;transition:.2s}.sidebar.open{left:0}.main{max-width:100vw}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="login-logo"><span class="v">PSF</span> <span class="b">ERP</span></div>
    <div class="login-sub">PHYTO STRIKE FORCE — Distribution Phyto &amp; Équipements</div>
    <label>Identifiant</label>
    <input id="lg-user" value="admin" autocomplete="username">
    <label>Mot de passe</label>
    <input id="lg-pass" type="password" value="psf2026" autocomplete="current-password">
    <button class="btn-p" style="width:100%;margin-top:20px;padding:11px" onclick="login()">Se connecter</button>
    <div id="lg-err" class="txt-r sm center" style="margin-top:10px;display:none">Identifiants invalides</div>
    <div class="sm txt-m center" style="margin-top:16px">admin / psf2026</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="brand"><span class="v">PSF</span> <span class="b">ERP</span></div>
    <div class="sp"></div>
    <select id="depotGlobal" class="depot-sel" onchange="setDepot(this.value)"></select>
    <div class="user-chip">
      <div class="avatar" id="userAv">A</div>
      <div><div id="userNom" class="bold">Admin</div><div class="sm txt-m" id="userRole">Administrateur</div></div>
      <button class="btn-g btn-sm" onclick="logout()" style="margin-left:8px">Quitter</button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main" id="main"></div>
  </div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modalBox"></div></div>

<script>
/* ============ PSF ERP — moteur ============ */
/* ====== QR LIB ====== */
//---------------------------------------------------------------------
//
// QR Code Generator for JavaScript
//
// Copyright (c) 2009 Kazuhiko Arase
//
// URL: http://www.d-project.com/
//
// Licensed under the MIT license:
//  http://www.opensource.org/licenses/mit-license.php
//
// The word 'QR Code' is registered trademark of
// DENSO WAVE INCORPORATED
//  http://www.denso-wave.com/qrcode/faqpatent-e.html
//
//---------------------------------------------------------------------

var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);
    };

    _this.addData = function(data, mode) {

      mode = mode || 'Byte';

      var newData = null;

      switch(mode) {
      case 'Numeric' :
        newData = qrNumber(data);
        break;
      case 'Alphanumeric' :
        newData = qrAlphaNum(data);
        break;
      case 'Byte' :
        newData = qr8BitByte(data);
        break;
      case 'Kanji' :
        newData = qrKanji(data);
        break;
      default :
        throw 'mode:' + mode;
      }

      _dataList.push(newData);
      _dataCache = null;
    };

    _this.isDark = function(row, col) {
      if (row < 0 || _moduleCount <= row || col < 0 || _moduleCount <= col) {
        throw row + ',' + col;
      }
      return _modules[row][col];
    };

    _this.getModuleCount = function() {
      return _moduleCount;
    };

    _this.make = function() {
      if (_typeNumber < 1) {
        var typeNumber = 1;

        for (; typeNumber < 40; typeNumber++) {
          var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, _errorCorrectionLevel);
          var buffer = qrBitBuffer();

          for (var i = 0; i < _dataList.length; i++) {
            var data = _dataList[i];
            buffer.put(data.getMode(), 4);
            buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
            data.write(buffer);
          }

          var totalDataCount = 0;
          for (var i = 0; i < rsBlocks.length; i++) {
            totalDataCount += rsBlocks[i].dataCount;
          }

          if (buffer.getLengthInBits() <= totalDataCount * 8) {
            break;
          }
        }

        _typeNumber = typeNumber;
      }

      makeImpl(false, getBestMaskPattern() );
    };

    _this.createTableTag = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var qrHtml = '';

      qrHtml += '<table style="';
      qrHtml += ' border-width: 0px; border-style: none;';
      qrHtml += ' border-collapse: collapse;';
      qrHtml += ' padding: 0px; margin: ' + margin + 'px;';
      qrHtml += '">';
      qrHtml += '<tbody>';

      for (var r = 0; r < _this.getModuleCount(); r += 1) {

        qrHtml += '<tr>';

        for (var c = 0; c < _this.getModuleCount(); c += 1) {
          qrHtml += '<td style="';
          qrHtml += ' border-width: 0px; border-style: none;';
          qrHtml += ' border-collapse: collapse;';
          qrHtml += ' padding: 0px; margin: 0px;';
          qrHtml += ' width: ' + cellSize + 'px;';
          qrHtml += ' height: ' + cellSize + 'px;';
          qrHtml += ' background-color: ';
          qrHtml += _this.isDark(r, c)? '#000000' : '#ffffff';
          qrHtml += ';';
          qrHtml += '"/>';
        }

        qrHtml += '</tr>';
      }

      qrHtml += '</tbody>';
      qrHtml += '</table>';

      return qrHtml;
    };

    _this.createSvgTag = function(cellSize, margin, alt, title) {

      var opts = {};
      if (typeof arguments[0] == 'object') {
        // Called by options.
        opts = arguments[0];
        // overwrite cellSize and margin.
        cellSize = opts.cellSize;
        margin = opts.margin;
        alt = opts.alt;
        title = opts.title;
      }

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      // Compose alt property surrogate

   r+='<rect x="'+(x*cell).toFixed(2)+'" y="'+(y*cell).toFixed(2)+'" width="'+cell.toFixed(2)+'" height="'+cell.toFixed(2)+'"/>';
 return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" xmlns="http://www.w3.org/2000/svg"><rect width="'+size+'" height="'+size+'" fill="#fff"/><g fill="#000">'+r+'</g></svg>';}

const STORES=['parametres','utilisateurs','produits','fournisseurs','depots','clients',
'lots','stock','mouvements','cmdAchat','cmdClient','livraisons','factures','avoirs',
'reglements','comptes','ecritures','employes','paies','presences','exercices',
'missions','conseils','rapports','seq'];
function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open('PSF_ERP',2);
  r.onupgradeneeded=e=>{const db=e.target.result;
    STORES.forEach(s=>{if(!db.objectStoreNames.contains(s))db.createObjectStore(s,{keyPath:'id'});});};
  r.onsuccess=e=>res(e.target.result); r.onerror=e=>rej(e);
});}
function tx(store,mode){return DB.transaction(store,mode).objectStore(store);}
function dbAll(s){return new Promise(r=>{const o=tx(s,'readonly').getAll();o.onsuccess=()=>r(o.result||[]);});}
function dbGet(s,id){return new Promise(r=>{const o=tx(s,'readonly').get(id);o.onsuccess=()=>r(o.result);});}
function dbPut(s,v){if(!v.id)v.id=uid();return new Promise(r=>{const o=tx(s,'readwrite').put(v);o.onsuccess=()=>r(v);});}
function dbDel(s,id){return new Promise(r=>{const o=tx(s,'readwrite').delete(id);o.onsuccess=()=>r();});}
async function nextSeq(k){let s=await dbGet('seq',k);if(!s)s={id:k,n:0};s.n++;await dbPut('seq',s);
  return String(s.n).padStart(4,'0');}

async function ecrire(journal,date,libelle,lignes,piece){
  // lignes: [{compte, debit, credit}]
  const ex=(await dbAll('exercices')).find(e=>e.actif);
  const e={id:uid(),journal,date,libelle,piece:piece||'',exercice:ex?.id,lignes};
  await dbPut('ecritures',e);
  // mise à jour soldes comptes
  for(const l of lignes){const c=await dbGet('comptes',l.compte);
    if(c){c.solde=(c.solde||0)+(l.debit||0)-(l.credit||0);await dbPut('comptes',c);}}
  return e;
}
async function balance(){
  const cs=await dbAll('comptes');const ecs=await dbAll('ecritures');
  const m={};cs.forEach(c=>m[c.num]={num:c.num,lib:c.libelle,type:c.type,debit:0,credit:0});
  ecs.forEach(e=>e.lignes.forEach(l=>{if(!m[l.compte])return;
    m[l.compte].debit+=l.debit||0;m[l.compte].credit+=l.credit||0;}));
  return Object.values(m);
}

/* ====== STOCK HELPERS ====== */
async function stockProduit(produitId,depotId){
  const s=await dbAll('stock');
  return s.filter(x=>x.produitId===produitId&&(!depotId||x.depotId===depotId))
    .reduce((a,b)=>a+b.qte,0);
}
async function valoStock(depotId){
  const stk=await dbAll('stock'),prods=await dbAll('produits');
  let v=0;for(const s of stk){if(depotId&&s.depotId!==depotId)continue;
    const p=prods.find(x=>x.id===s.produitId);if(p)v+=s.qte*p.prixAchat;}return v;
}
async function mouvStock(produitId,depotId,qte,type,ref){
  // type entree/sortie ; qte positif
  if(type==='sortie'){
    let reste=qte;const lots=(await dbAll('stock')).filter(s=>s.produitId===produitId&&s.depotId===depotId&&s.qte>0)
      .sort((a,b)=>a.id<b.id?-1:1);
    for(const s of lots){if(reste<=0)break;const pris=Math.min(s.qte,reste);s.qte-=pris;reste-=pris;await dbPut('stock',s);}
  }else{
    let s=(await dbAll('stock')).find(x=>x.produitId===produitId&&x.depotId===depotId);
    if(s){s.qte+=qte;await dbPut('stock',s);}
    else await dbPut('stock',{id:uid(),produitId,depotId,lotId:null,qte});
  }
  await dbPut('mouvements',{id:uid(),type,produitId,depotId,qte,ref,date:today()});
}

async function inventaireModal(){const prods=await dbAll('produits');const deps=await dbAll('depots');
  const depNom=deps.find(d=>d.id===STATE.depot)?.nom||'';let rows='';
  for(const p of prods){const q=await stockProduit(p.id,STATE.depot);
    rows+=`<tr><td>${esc(p.nom)}</td><td class="right txt-m">${FCFA0(q)}</td>
     <td style="width:110px"><input type="number" id="inv-${p.id}" value="${q}" data-old="${q}" data-pa="${p.prixAchat}" oninput="recalcEcart()"></td>
     <td class="right" id="inve-${p.id}">—</td></tr>`;}
  modal('Inventaire physique — '+depNom,
   `<table><tr><th>Produit</th><th class="right">Théorique</th><th>Compté</th><th class="right">Écart valorisé</th></tr>${rows}</table>
    <div class="row" style="margin-top:10px;align-items:center">
      <div class="bold f" id="inv-total">Écart total : 0 F</div>
      <label class="sm" style="display:flex;align-items:center;gap:6px;width:auto"><input type="checkbox" id="inv-compta" style="width:auto"> Comptabiliser l'écart (311 / 6031)</label>
    </div>`,
   `<button class="btn-g" onclick="closeModal()">Annuler</button>
    <button class="btn-p" onclick="saveInventaire()">Valider écarts</button>`,true);
}
function recalcEcart(){let tot=0;
  document.querySelectorAll('input[id^="inv-"]').forEach(e=>{if(e.dataset.old===undefined)return;
    const old=parseFloat(e.dataset.old),pa=parseFloat(e.dataset.pa)||0,neu=parseFloat(e.value)||0;
    const v=(neu-old)*pa;tot+=v;
    const cell=document.getElementById('inve-'+e.id.replace('inv-',''));
    if(cell){cell.textContent=FCFA(v);cell.className='right '+(v<0?'txt-r':(v>0?'txt-v':'txt-m'));}});
  const tt=document.getElementById('inv-total');
  if(tt)tt.textContent='Écart total : '+FCFA(tot)+(tot<0?' (perte)':(tot>0?' (boni)':''));
}
async function saveInventaire(){const prods=await dbAll('produits');let totEcart=0;
  for(const p of prods){const e=document.getElementById('inv-'+p.id);if(!e)continue;
    const old=parseFloat(e.dataset.old),neu=parseFloat(e.value)||0,d=neu-old;
    if(d!==0){await mouvStock(p.id,STATE.depot,Math.abs(d),d>0?'entree':'sortie','Inventaire');totEcart+=d*p.prixAchat;}}
  if(document.getElementById('inv-compta')?.checked&&Math.abs(totEcart)>0){
    await ensureCompte('311','Marchandises (stock)','actif');
    await ensureCompte('6031','Variation stocks marchandises','charge');
    const lignes=totEcart>0
      ?[{compte:'311',debit:totEcart,credit:0},{compte:'6031',debit:0,credit:totEcart}]
      :[{compte:'6031',debit:-totEcart,credit:0},{compte:'311',debit:0,credit:-totEcart}];
    await ecrire('OD',today(),'Régularisation inventaire',lignes,'INV');
  }
  closeModal();toast('Inventaire validé'+(totEcart?' • écart '+FCFA(totEcart):''));go('stock');
}

async function doFacturerCmd(id){const c=await dbGet('cmdClient',id);const type=val('ft-type');
  await genererFacture(c.clientId,c.lignes,id,type);
  c.statut='facturee';await dbPut('cmdClient',c);
  closeModal();toast((type==='fne'?'FNE':'Facture')+' générée + écriture vente');go('factures');
}
async function genererFacture(clientId,lignes,cmdId,type){
  type=type||'simple';
  const prods=await dbAll('produits');const cl=await dbGet('clients',clientId);
  let ht=0,tva=0;
  lignes.forEach(l=>{const p=prods.find(x=>x.id===l.produitId);const lht=l.qte*l.pu;
    l.totalHT=lht;l.tva=p.tva;ht+=lht;tva+=lht*p.tva/100;});
  const num=await nextSeq(type==='fne'?'fne':'facture');const ttc=ht+tva;
  const fac={id:uid(),num:(type==='fne'?'FNE-':'FA-')+num,clientId,cmdId,date:today(),lignes,type,
    nccClient:cl.ncc||'',statutFNE:type==='fne'?'a_transmettre':'',refFNE:'',
    totalHT:ht,totalTVA:Math.round(tva),totalTTC:Math.round(ttc),regle:0,statut:'emise'};
  await dbPut('factures',fac);
  // écriture vente : 411 D / 701 C / 4431 C
  await ecrire('VTE',today(),'Vente '+fac.num+' — '+cl.nom,[
    {compte:cl.compte||'4111',debit:Math.round(ttc),credit:0},
    {compte:'701',debit:0,credit:ht},
    {compte:'4431',debit:0,credit:Math.round(tva)}],fac.num);
  return fac;
}

async function reglerFacture(id){const f=await dbGet('factures',id);const reste=f.totalTTC-(f.regle||0);
  modal('Règlement — '+f.num,`
   <p class="sm txt-m">Reste à payer : <b class="txt-r">${FCFA(reste)}</b></p>
   <div class="fld"><label>Montant</label><input id="rg-mt" type="number" value="${reste}"></div>
   <div class="fld"><label>Mode</label><select id="rg-mode">
     <option value="571">Espèces (Caisse)</option><option value="531">Wave / Mobile Money</option>
     <option value="531">Orange Money</option><option value="531">MTN MoMo</option>
     <option value="521">Banque / Virement</option></select></div>`,
   `<button class="btn-g" onclick="closeModal()">Annuler</button>
    <button class="btn-p" onclick="saveReglement('${id}')">Encaisser</button>`);
}
async function saveReglement(id){const f=await dbGet('factures',id);const mt=num('rg-mt');const cpt=val('rg-mode');
  if(mt<=0)return;f.regle=(f.regle||0)+mt;if(f.regle>=f.totalTTC)f.statut='payee';await dbPut('factures',f);
  const cl=await dbGet('clients',f.clientId);
  await dbPut('reglements',{id:uid(),factureId:id,montant:mt,mode:cpt,date:today()});
  // écriture encaissement : trésorerie D / client C
  await ecrire('TRE',today(),'Règlement '+f.num,[
    {compte:cpt,debit:mt,credit:0},{compte:cl.compte||'4111',debit:0,credit:mt}],f.num);
  closeModal();toast('Encaissement enregistré');go('factures');
}
async function imprimerFacture(id){const f=await dbGet('factures',id);const cl=await dbGet('clients',f.clientId);
  const prods=await dbAll('produits');const p=await dbGet('parametres','main');const tFNE=f.type==='fne';
  const lignesHTML=f.lignes.map(l=>{const pr=prods.find(x=>x.id===l.produitId);
    return `<tr><td>${esc(pr?.nom)}</td><td class="r">${FCFA0(l.qte)}</td><td class="r">${FCFA0(l.pu)}</td>
    <td class="r">${l.tva}%</td><td class="r">${FCFA0(l.totalHT)}</td></tr>`;}).join('');
  const taux={};f.lignes.forEach(l=>{taux[l.tva]=(taux[l.tva]||0)+l.totalHT;});
  const tvaRows=Object.entries(taux).map(([t,base])=>`<tr><td class="r">Base ${t}%</td><td class="r">${FCFA0(base)}</td><td class="r">${FCFA0(base*t/100)}</td></tr>`).join('');
  let qr='';
  if(tFNE){const data='NCC:'+(p.ncc||'')+';FAC:'+f.num+';DATE:'+f.date+';TTC:'+f.totalTTC+';TVA:'+f.totalTVA+';CLIENT:'+(cl.ncc||cl.nom)+';REF:'+(f.refFNE||'EN_ATTENTE');
    qr=qrSVG(data,118);}
  const titre=tFNE?'FACTURE NORMALISÉE ÉLECTRONIQUE':'FACTURE';
  const w=window.open('','_blank');
  w.document.write(`<html><head><title>${f.num}</title><style>body{font-family:Arial;padding:28px;font-size:12px;color:#222}
   h2{color:#1f7a3d;margin:0}table{width:100%;border-collapse:collapse;margin-top:10px}td,th{border:1px solid #ccc;padding:6px}
   th{background:#f1f5f9}.r{text-align:right}.head{display:flex;justify-content:space-between;align-items:flex-start}
   .box{border:1px solid #ccc;padding:8px;border-radius:5px;margin-top:8px}
   .fne-band{background:#1d3f6e;color:#fff;padding:6px 10px;border-radius:5px;font-weight:bold;text-align:center;margin:8px 0}
   .mentions{font-size:10px;color:#555;margin-top:6px}.qr{text-align:center}</style></head><body>
   <div class="head">
    <div><h2>${esc(p.nom)} — ${esc(p.sigle)}</h2>
     <div class="mentions">${esc(p.forme)} • ${esc(p.siege)}<br>Tél ${esc(p.tel)} • ${esc(p.mail)}<br>
     RCCM ${esc(p.rccm)}${p.ncc?' • NCC '+esc(p.ncc):''}${p.regime?'<br>Régime: '+esc(p.regime):''}${p.centre?' • '+esc(p.centre):''}</div></div>
    ${tFNE?`<div class="qr">${qr}<div style="font-size:9px">Vérification DGI e-facture</div></div>`:''}
   </div>
   ${tFNE?`<div class="fne-band">${titre}</div>`:`<h3>${titre}</h3>`}
   <div class="box"><b>N° ${esc(f.num)}</b> • Date ${fmtD(f.date)}${tFNE?(f.refFNE?' • Réf FNE: '+esc(f.refFNE):' • <span style="color:#b45309">FNE à transmettre à la DGI</span>'):''}</div>
   <p><b>Client (Doit):</b> ${esc(cl.nom)} — ${esc(cl.ville)} (${esc(cl.zone)})${cl.ncc?'<br><b>NCC client:</b> '+esc(cl.ncc):''}</p>
   <table><tr><th>Désignation</th><th class="r">Qté</th><th class="r">P.U. HT</th><th class="r">TVA</th><th class="r">Total HT</th></tr>
   ${lignesHTML}
   <tr><td colspan=4 class="r"><b>Total HT</b></td><td class="r"><b>${FCFA0(f.totalHT)}</b></td></tr>
   <tr><td colspan=4 class="r">TVA</td><td class="r">${FCFA0(f.totalTVA)}</td></tr>
   <tr><td colspan=4 class="r"><b>NET À PAYER TTC</b></td><td class="r"><b>${FCFA0(f.totalTTC)} F</b></td></tr></table>
   ${tFNE?`<table style="margin-top:6px;max-width:340px"><tr><th>Ventilation TVA</th><th class="r">Base</th><th class="r">Montant</th></tr>${tvaRows}</table>`:''}
   <p class="mentions">Arrêtée à la somme de ${FCFA0(f.totalTTC)} francs CFA.
   ${tFNE?'Facture normalisée conforme aux exigences de la DGI (Côte d’Ivoire), à transmettre via la plateforme e-facture.':'Document non normalisé — Conforme SYSCOHADA.'}</p>

PAGES.compta=async()=>{

  tabComptaRender('journal');
};
function tabCompta(t,el){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));el.classList.add('on');tabComptaRender(t);}
async function tabComptaRender(t){const box=document.getElementById('compta-body');
  if(t==='journal'){const ecs=(await dbAll('ecritures')).sort((a,b)=>b.id<a.id?-1:1).slice(0,60);
    box.innerHTML=`<div class="card"><table><tr><th>Date</th><th>Jrnl</th><th>Pièce</th><th>Libellé</th><th>Compte</th><th class="right">Débit</th><th class="right">Crédit</th></tr>
     ${ecs.flatMap(e=>e.lignes.map((l,i)=>`<tr>
      <td>${i===0?fmtD(e.date):''}</td><td>${i===0?`<span class="tag t-gris">${e.journal}</span>`:''}</td>
      <td class="sm">${i===0?esc(e.piece):''}</td><td class="sm">${i===0?esc(e.libelle):''}</td>
      <td>${l.compte}</td><td class="right">${l.debit?FCFA0(l.debit):''}</td>
      <td class="right">${l.credit?FCFA0(l.credit):''}</td></tr>`)).join('')
     ||'<tr><td colspan=7 class="empty">Aucune écriture</td></tr>'}</table></div>`;
  }else if(t==='grandlivre'){const bal=await balance();
    box.innerHTML=`<div class="card"><table><tr><th>Compte</th><th>Libellé</th><th class="right">Débit</th><th class="right">Crédit</th><th class="right">Solde</th></tr>
     ${bal.filter(b=>b.debit||b.credit).map(b=>`<tr><td class="bold">${b.num}</td><td>${esc(b.lib)}</td>
      <td class="right">${FCFA0(b.debit)}</td><td class="right">${FCFA0(b.credit)}</td>
      <td class="right bold">${FCFA0(b.debit-b.credit)}</td></tr>`).join('')}</table></div>`;
  }else if(t==='balance'){const bal=await balance();
    const td=bal.reduce((a,b)=>a+b.debit,0),tc=bal.reduce((a,b)=>a+b.credit,0);
    box.innerHTML=`<div class="card"><table><tr><th>Compte</th><th>Libellé</th><th class="right">Total Débit</th><th class="right">Total Crédit</th><th class="right">Solde Déb</th><th class="right">Solde Créd</th></tr>
     ${bal.filter(b=>b.debit||b.credit).map(b=>{const s=b.debit-b.credit;return `<tr><td class="bold">${b.num}</td><td>${esc(b.lib)}</td>
      <td class="right">${FCFA0(b.debit)}</td><td class="right">${FCFA0(b.credit)}</td>
      <td class="right">${s>0?FCFA0(s):''}</td><td class="right">${s<0?FCFA0(-s):''}</td></tr>`;}).join('')}
     <tr style="background:#f1f5f9"><td colspan=2 class="bold">TOTAUX</td>
      <td class="right bold">${FCFA0(td)}</td><td class="right bold">${FCFA0(tc)}</td>
      <td colspan=2 class="right bold ${Math.abs(td-tc)<1?'txt-v':'txt-r'}">${Math.abs(td-tc)<1?'✓ Équilibrée':'Écart '+FCFA0(td-tc)}</td></tr></table></div>`;
  }else if(t==='resultat'){const bal=await balance();
    const g=cl=>bal.filter(b=>b.num.startsWith(cl)).reduce((a,b)=>a+(b.credit-b.debit),0);
    const gd=cl=>bal.filter(b=>b.num.startsWith(cl)).reduce((a,b)=>a+(b.debit-b.credit),0);
    const ventes=g('70'),achats=gd('60'),autres=gd('62')+gd('61'),perso=gd('66'),
      finance=gd('67'),amort=gd('68'),impots=gd('64');
    const va=ventes-achats-autres;const rex=va-perso-amort-impots;const rnet=rex-finance;
    const lr=(l,v,neg)=>`<tr><td>${l}</td><td class="right bold ${neg&&v?'txt-r':''}">${neg?'-':''}${FCFA(v)}</td></tr>`;
    box.innerHTML=`<div class="card" style="max-width:520px"><table>
     ${lr('Ventes de marchandises (70)',ventes)}
     ${lr('Achats consommés (60)',achats,1)}
     ${lr('Autres charges externes (61/62)',autres,1)}
     <tr style="background:#ecfdf5"><td class="bold">Valeur ajoutée</td><td class="right bold">${FCFA(va)}</td></tr>
     ${lr('Charges de personnel (66)',perso,1)}
     ${lr('Impôts et taxes (64)',impots,1)}
     ${lr('Dotations amortissements (68)',amort,1)}
     <tr style="background:#dbeafe"><td class="bold">Résultat d'exploitation</td><td class="right bold">${FCFA(rex)}</td></tr>
     ${lr('Frais financiers (67)',finance,1)}
     <tr style="background:${rnet>=0?'#dcfce7':'#fee2e2'}"><td class="bold">RÉSULTAT NET</td><td class="right bold">${FCFA(rnet)}</td></tr>
    </table></div>`;
  }
}
async function ecritureModal(){const cs=await dbAll('comptes');LIGNES=[{compte:'',debit:0,credit:0},{compte:'',debit:0,credit:0}];
  const opts=cs.map(c=>`<option value="${c.num}">${c.num} — ${esc(c.libelle)}</option>`).join('');
  modal('Écriture manuelle',`
   <div class="row"><div class="fld f"><label>Journal</label><select id="ec-jrn">
     <option value="OD">OD (opérations diverses)</option><option value="ACH">ACH</option>
     <option value="VTE">VTE</option><option value="TRE">TRE</option><option value="PAIE">PAIE</option></select></div>
   <div class="fld f"><label>Date</label><input id="ec-date" type="date" value="${today()}"></div></div>
   <div class="fld"><label>Libellé</label><input id="ec-lib"></div>
   <div id="ec-lignes"></div>
   <button class="btn-g btn-sm" onclick="LIGNES.push({compte:'',debit:0,credit:0});renderEcLignes()" style="margin-top:8px">+ Ligne</button>
   <div id="ec-bal" style="margin-top:10px"></div>
   <div style="display:none" id="ec-opts">${opts}</div>`,
   `<button class="btn-g" onclick="closeModal()">Annuler</button>
    <button class="btn-p" onclick="saveEcriture()">Enregistrer</button>`,true);
  renderEcLignes();
}
function renderEcLignes(){const opts=document.getElementById('ec-opts').innerHTML;
  document.getElementById('ec-lignes').innerHTML=`<table class="lines-tbl"><tr><th>Compte</th><th>Débit</th><th>Crédit</th><th></th></tr>
   ${LIGNES.map((l,i)=>`<tr>
    <td><select onchange="LIGNES[${i}].compte=this.value">${opts.replace(`value="${l.compte}"`,`value="${l.compte}" selected`)}</select></td>
    <td><input type="number" value="${l.debit||''}" style="width:100px" onchange="LIGNES[${i}].debit=+this.value;LIGNES[${i}].credit=0;renderEcLignes()"></td>
    <td><input type="number" value="${l.credit||''}" style="width:100px" onchange="LIGNES[${i}].credit=+this.value;LIGNES[${i}].debit=0;renderEcLignes()"></td>
    <td><button class="btn-r btn-sm" onclick="LIGNES.splice(${i},1);renderEcLignes()">×</button></td></tr>`).join('')}</table>`;
  const d=LIGNES.reduce((a,l)=>a+(+l.debit||0),0),c=LIGNES.reduce((a,l)=>a+(+l.credit||0),0);
  document.getElementById('ec-bal').innerHTML=`<span class="bold ${Math.abs(d-c)<1?'txt-v':'txt-r'}">
    Débit ${FCFA(d)} • Crédit ${FCFA(c)} ${Math.abs(d-c)<1?'✓':'• Écart '+FCFA(d-c)}</span>`;
}
async function saveEcriture(){const lignes=LIGNES.filter(l=>l.compte&&(l.debit||l.credit));
  const d=lignes.reduce((a,l)=>a+(+l.debit||0),0),c=lignes.reduce((a,l)=>a+(+l.credit||0),0);
  if(Math.abs(d-c)>1){toast('Écriture déséquilibrée');return;}
  await ecrire(val('ec-jrn'),val('ec-date'),val('ec-lib'),lignes,'');
  closeModal();toast('Écriture enregistrée');go('compta');
}

/* ---- ANALYTIQUE ---- */
PAGES.analytique=async()=>{
  const facs=(await dbAll('factures')).filter(f=>f.statut!=='annulee');
  const prods=await dbAll('produits'),cls=await dbAll('clients'),emps=await dbAll('employes');
  const lvs=await dbAll('livraisons');
  // par produit (CA + marge)
  const parProd={};facs.forEach(f=>(f.lignes||[]).forEach(l=>{const p=prods.find(x=>x.id===l.produitId);if(!p)return;
    if(!parProd[l.produitId])parProd[l.produitId]={ca:0,marge:0,qte:0};
    parProd[l.produitId].ca+=l.totalHT;parProd[l.produitId].qte+=l.qte;
    parProd[l.produitId].marge+=l.totalHT-l.qte*p.prixAchat;}));
  // par zone
  const parZone={};facs.forEach(f=>{const cl=cls.find(x=>x.id===f.clientId);if(!cl)return;
    parZone[cl.zone]=(parZone[cl.zone]||0)+f.totalHT;});
  // par commercial (CA via livraisons → factures)
  const parCom={};
  for(const f of facs){const cmd=f.cmdId?await dbGet('cmdClient',f.cmdId):null;
    const comId=cmd?.commercialId;if(comId)parCom[comId]=(parCom[comId]||0)+f.totalHT;}
  const totCA=facs.reduce((a,f)=>a+f.totalHT,0);
  H(pageH('Comptabilité analytique')+`
   <div class="row">
    <div class="card f"><div class="card-h">📦 Rentabilité par produit</div>
     <table><tr><th>Produit</th><th class="right">Qté</th><th class="right">CA HT</th><th class="right">Marge</th><th class="right">%</th></tr>
     ${Object.entries(parProd).sort((a,b)=>b[1].ca-a[1].ca).map(([id,d])=>{const p=prods.find(x=>x.id===id);
      return `<tr><td>${esc(p?.nom)}</td><td class="right">${FCFA0(d.qte)}</td><td class="right">${FCFA(d.ca)}</td>
      <td class="right bold txt-v">${FCFA(d.marge)}</td><td class="right">${d.ca?Math.round(d.marge/d.ca*100):0}%</td></tr>`;}).join('')
     ||'<tr><td colspan=5 class="empty">Aucune vente</td></tr>'}</table></div>
   </div>
   <div class="row">
    <div class="card f"><div class="card-h">🗺️ CA par zone</div>
     <table>${Object.entries(parZone).sort((a,b)=>b[1]-a[1]).map(([z,v])=>`<tr><td>${esc(z)}</td>
      <td style="width:50%"><div class="progress"><i style="width:${totCA?v/totCA*100:0}%"></i></div></td>
      <td class="right bold">${FCFA(v)}</td></tr>`).join('')||'<tr><td class="empty">—</td></tr>'}</table></div>
    <div class="card f"><div class="card-h">🧑‍💼 CA par commercial</div>
     <table>${emps.filter(e=>e.commission).map(e=>{const v=parCom[e.id]||0;
      return `<tr><td>${esc(e.nom)}</td><td class="right">${FCFA(v)}</td>
      <td class="right sm txt-m">comm. ${FCFA(v*0.025)}</td></tr>`;}).join('')}</table></div>
   </div>`);
};

function calcPaie(emp,p,commission){
  const brut=emp.brut*emp.etp;const cotisSal=brut*0.063; // CNPS part salariale ~6.3%
  const its=brut*p.tauxITS/100;
  const net=brut-cotisSal-its+(commission||0);
  const chargesPatr=brut*p.tauxCNPS/100;
  return {brut,cotisSal:Math.round(cotisSal),its:Math.round(its),commission:commission||0,
    net:Math.round(net),chargesPatr:Math.round(chargesPatr)};
}

/* ---- DÉCLARATIONS FISCALES & SOCIALES ---- */
PAGES.fiscal=async()=>{
  const p=await dbGet('parametres','main');const bal=await balance();
  const facs=(await dbAll('factures')).filter(f=>f.statut!=='annulee');
  const moisCourant=today().slice(0,7);
  const facsM=facs.filter(f=>(f.date||'').startsWith(moisCourant));
  const tvaCollectee=facsM.reduce((a,f)=>a+f.totalTVA,0);
  const cmdA=(await dbAll('cmdAchat')).filter(c=>c.statut==='recue'&&(c.dateRecep||'').startsWith(moisCourant));
  const tvaDeduct=cmdA.reduce((a,c)=>a+Math.round(c.totalHT*0.02),0);
  const tvaNet=tvaCollectee-tvaDeduct;
  // résultat → IS
  const g=cl=>bal.filter(b=>b.num.startsWith(cl)).reduce((a,b)=>a+(b.credit-b.debit),0);
  const gd=cl=>bal.filter(b=>b.num.startsWith(cl)).reduce((a,b)=>a+(b.debit-b.credit),0);
  const resultat=g('70')-gd('60')-gd('61')-gd('62')-gd('64')-gd('66')-gd('67')-gd('68');
  const is=Math.max(0,resultat*p.tauxIS/100);
  // social
  const paiesM=(await dbAll('paies')).filter(x=>x.periode===moisCourant);
  const cnps=paiesM.reduce((a,x)=>a+x.chargesPatr+x.cotisSal,0);
  const its=paiesM.reduce((a,x)=>a+(x.brut*p.tauxITS/100),0);
  H(pageH('Déclarations Fiscales & Sociales')+`
   <div class="card"><div class="card-h">🧾 Déclaration TVA — ${moisCourant}</div>
    <table style="max-width:480px">
     <tr><td>TVA collectée (ventes)</td><td class="right">${FCFA(tvaCollectee)}</td></tr>
     <tr><td>TVA déductible (achats)</td><td class="right txt-r">- ${FCFA(tvaDeduct)}</td></tr>
     <tr style="background:${tvaNet>=0?'#fee2e2':'#dcfce7'}"><td class="bold">${tvaNet>=0?'TVA à décaisser':'Crédit de TVA'}</td>
      <td class="right bold">${FCFA(Math.abs(tvaNet))}</td></tr></table></div>
   <div class="card"><div class="card-h">🏛️ Impôt sur les sociétés (BIC ${p.tauxIS}%)</div>
    <table style="max-width:480px">
     <tr><td>Résultat fiscal cumulé</td><td class="right ${resultat<0?'txt-r':''}">${FCFA(resultat)}</td></tr>
     <tr style="background:#fef3c7"><td class="bold">IS estimé</td><td class="right bold">${FCFA(is)}</td></tr></table>
    <p class="sm txt-m">Min. forfaitaire IMF applicable selon CGI. À valider avec expert-comptable.</p></div>
   <div class="card"><div class="card-h">👥 Déclarations sociales — ${moisCourant}</div>
    <table style="max-width:480px">
     <tr><td>CNPS (part patronale + salariale)</td><td class="right">${FCFA(cnps)}</td></tr>
     <tr><td>ITS (impôt sur traitements/salaires)</td><td class="right">${FCFA(its)}</td></tr>
     <tr style="background:#dbeafe"><td class="bold">Total charges sociales</td><td class="right bold">${FCFA(cnps+its)}</td></tr></table>
    ${paiesM.length?'':'<p class="sm txt-r">Aucune paie générée ce mois — allez dans RH → Générer paie.</p>'}</div>`);
};

  const ok=await postFraisMission(m);

async function postFraisMission(m){const frais=(m.carburant||0)+(m.perdiem||0);
  if(frais<=0||m.fraisComptabilise)return false;
  await ensureCompte('638','Frais de mission / indemnités','charge');
  const lignes=[];
  if(m.carburant)lignes.push({compte:'627',debit:m.carburant,credit:0});
  if(m.perdiem)lignes.push({compte:'638',debit:m.perdiem,credit:0});
  lignes.push({compte:'571',debit:0,credit:frais});

async function conseilVersDevis(id){
  const clientId=val('co-client'),produitId=val('co-prod'),surf=num('co-surf');
  if(!produitId){toast('Choisir un produit d\'abord');return;}
  const cl=await dbGet('clients',clientId);const p=await dbGet('produits',produitId);
  // estimation qté : dose numérique × surface si parsable, sinon surface
  const doseNum=parseFloat((val('co-dose')||'').replace(',','.'))||1;
  const qte=Math.max(1,Math.round(doseNum*surf))||surf||1;
  const pu=tarifPrix(p,cl.tarif);
  const lignes=[{produitId,qte,pu,tva:p.tva,totalHT:qte*pu}];
  const num=await nextSeq('cmdClient');
  await dbPut('cmdClient',{id:uid(),num:'CC-'+num,clientId,date:today(),depotId:STATE.depot,
    lignes,totalHT:qte*pu,statut:'devis',origine:'conseil'});

  closeModal();toast('Devis créé depuis le conseil ('+qte+' '+p.unite+')');go('commandes');
}

async function stockValo(box){
  const prods=await dbAll('produits'),deps=await dbAll('depots'),stk=await dbAll('stock');
  const qte=(pid,did)=>stk.filter(s=>s.produitId===pid&&s.depotId===did).reduce((a,b)=>a+b.qte,0);
  let totDepot={};deps.forEach(d=>totDepot[d.id]=0);let grand=0;
  const rows=prods.map(p=>{let tds='';let lineVal=0;
    deps.forEach(d=>{const q=qte(p.id,d.id);const v=q*p.prixAchat;lineVal+=v;totDepot[d.id]+=v;
      tds+=`<td class="right ${q<=0?'txt-m':''}">${q?FCFA0(q):'—'}</td>`;});
    grand+=lineVal;
    return `<tr><td class="bold">${esc(p.nom)}</td>${tds}<td class="right bold">${FCFA(lineVal)}</td></tr>`;}).join('');
  box.innerHTML=`<div class="card"><div class="card-h">Valorisation du stock par dépôt (coût d'achat)</div>
   <table><tr><th>Produit</th>${deps.map(d=>`<th class="right">${esc(d.nom)}</th>`).join('')}<th class="right">Valeur totale</th></tr>
   ${rows}
   <tr style="background:#f1f5f9"><td class="bold">VALEUR DÉPÔT</td>
    ${deps.map(d=>`<td class="right bold">${FCFA(totDepot[d.id])}</td>`).join('')}
    <td class="right bold">${FCFA(grand)}</td></tr></table></div>`;
}

/* ---- RÉAPPROVISIONNEMENT AUTOMATIQUE ---- */
async function stockReappro(box){
  const prods=await dbAll('produits'),fs=await dbAll('fournisseurs');
  let items=[];
  for(const p of prods){const q=await stockProduit(p.id,null);
    if(q<=p.seuil)items.push({p,q,aCommander:Math.max(p.seuil,Math.ceil(p.seuil*2-q))});}
  if(!items.length){box.innerHTML='<div class="card"><div class="empty">✓ Aucun produit sous le seuil</div></div>';return;}
  box.innerHTML=`<div class="card"><div class="card-h">⚠️ Produits à réapprovisionner (${items.length})</div>
   <p class="sm txt-m">Cible de réappro = 2 × seuil. Qté proposée = cible − stock actuel.</p>
   <table><tr><th>Produit</th><th>Fournisseur</th><th class="right">Stock</th><th class="right">Seuil</th><th class="right">À commander</th><th class="right">Montant</th></tr>
   ${items.map(it=>{const f=fs.find(x=>x.id===it.p.fourn);
     return `<tr><td class="bold">${esc(it.p.nom)}</td><td>${esc(f?.nom||'—')}</td>
     <td class="right txt-r bold">${FCFA0(it.q)}</td><td class="right txt-m">${FCFA0(it.p.seuil)}</td>
     <td class="right bold">${FCFA0(it.aCommander)} ${it.p.unite}</td>
     <td class="right">${FCFA(it.aCommander*it.p.prixAchat)}</td></tr>`;}).join('')}
   </table>
   <button class="btn-p" style="margin-top:12px" onclick="genererReappro()">⚙️ Générer commandes d'achat (groupées par fournisseur)</button></div>`;
}
async function genererReappro(){
  const prods=await dbAll('produits');const byF={};
  for(const p of prods){const q=await stockProduit(p.id,null);
    if(q<=p.seuil){const aCommander=Math.max(p.seuil,Math.ceil(p.seuil*2-q));
      const f=p.fourn||'_';(byF[f]=byF[f]||[]).push({produitId:p.id,qte:aCommander,pu:p.prixAchat});}}
  let n=0;
  for(const [fournId,lignes] of Object.entries(byF)){if(!lignes.length)continue;
    const num=await nextSeq('cmdAchat');const totalHT=lignes.reduce((a,l)=>a+l.qte*l.pu,0);
    await dbPut('cmdAchat',{id:uid(),num:'CA-'+num,fournId:fournId==='_'?'':fournId,date:today(),
      lignes,totalHT,statut:'brouillon',auto:true});n++;}
  toast(n+" commande(s) d'achat générée(s)");go('appro');
}

async function saveDepot(id){const d=id?await dbGet('depots',id):{id:uid()};
  Object.assign(d,{nom:val('d-nom'),zone:val('d-zone'),principal:val('d-princ')==='1'});
  await dbPut('depots',d);await fillDepots();closeModal();toast('Dépôt enregistré');go('stock');
}
async function delDepot(id){const v=await valoStock(id);
  if(v>0){toast("Dépôt non vide — videz le stock d'abord");return;}
  await dbDel('depots',id);await fillDepots();closeModal();toast('Dépôt supprimé');go('stock');
}
